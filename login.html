<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SBAR Brew â Sign In</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{--espresso:#120800;--roast:#1E0C00;--dark:#2A1200;--caramel:#C47B2B;--cream:#F5EDD6;--steam:#D4C5A9;--muted:#7A5C3A;--border:#3D1A00;--danger:#991B1B;--danger-bg:#3D0A0A;}
body{font-family:'DM Sans',sans-serif;background:var(--espresso);color:var(--cream);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;}
.container{width:100%;max-width:400px;}
.logo{text-align:center;margin-bottom:2rem;}
.logo-name{font-family:'Playfair Display',serif;font-size:36px;color:var(--caramel);}
.logo-name span{font-style:italic;color:var(--cream);}
.logo-sbar{font-size:12px;color:var(--muted);margin-top:6px;letter-spacing:0.04em;}
.card{background:var(--dark);border:1px solid var(--border);border-radius:12px;padding:2rem;}
.tabs{display:flex;gap:0;margin-bottom:1.5rem;border-bottom:1px solid var(--border);}
.tab{flex:1;padding:10px;text-align:center;font-size:14px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;transition:all 0.15s;font-family:'DM Sans',sans-serif;}
.tab.active{color:var(--caramel);border-bottom-color:var(--caramel);}
.field{margin-bottom:1rem;}
label{display:block;font-size:13px;font-weight:500;color:var(--steam);margin-bottom:6px;}
input[type="email"],input[type="password"]{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:15px;font-family:'DM Sans',sans-serif;color:var(--cream);background:var(--roast);outline:none;transition:border-color 0.15s;}
input:focus{border-color:var(--caramel);}
.submit-btn{width:100%;padding:12px;background:var(--caramel);color:var(--espresso);border:none;border-radius:8px;font-size:15px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:0.5rem;transition:opacity 0.15s;}
.submit-btn:hover{opacity:0.9;}
.submit-btn:disabled{opacity:0.5;cursor:not-allowed;}
.error-box{display:none;background:var(--danger-bg);color:#FCA5A5;border:1px solid var(--danger);border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:1rem;}
.trial-note{background:var(--roast);border-radius:8px;padding:12px 14px;font-size:13px;color:var(--muted);margin-bottom:1.5rem;text-align:center;border:1px solid var(--border);}
.trial-note strong{color:var(--caramel);}
.disclaimer{font-size:11px;color:var(--muted);text-align:center;margin-top:1.5rem;line-height:1.6;}
.disclaimer a{color:var(--muted);}
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <div class="logo-name">SBAR <span>Brew</span></div>
    <div class="logo-sbar">S: Coffee Â· B: School Â· A: Exhausted Â· R: Study</div>
  </div>
  <div class="card">
    <div class="trial-note"><strong>Free trial</strong> â 3 cards per subject, no credit card needed</div>
    <div class="tabs">
      <button class="tab active" id="tab-signin" onclick="switchTab('signin')">Sign in</button>
      <button class="tab" id="tab-signup" onclick="switchTab('signup')">Create account</button>
    </div>
    <div id="auth-error" class="error-box"></div>
    <div class="field">
      <label for="email">Email address</label>
      <input type="email" id="email" placeholder="you@email.com" autocomplete="email">
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="At least 6 characters">
    </div>
    <button class="submit-btn" id="auth-submit" data-label="Sign in" onclick="handleSubmit()">Sign in</button>
  </div>
  <div class="disclaimer">
    For educational use only. Always verify independently before clinical application.<br>
    <a href="terms.html">Terms of Use</a>
  </div>
</div>
<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
<script>
let mode='signin'
getUser().then(u=>{ if(u) window.location.href='dashboard.html' })
function switchTab(m){
  mode=m
  document.getElementById('tab-signin').classList.toggle('active',m==='signin')
  document.getElementById('tab-signup').classList.toggle('active',m==='signup')
  const btn=document.getElementById('auth-submit')
  btn.textContent=m==='signup'?'Create account':'Sign in'
  btn.dataset.label=btn.textContent
  clearError()
}
function handleSubmit(){
  const email=document.getElementById('email').value.trim()
  const password=document.getElementById('password').value
  if(!email||!password){showError('Please enter your email and password.');return}
  handleAuth(mode,email,password)
}
document.addEventListener('keydown',e=>{ if(e.key==='Enter') handleSubmit() })
</script>
</body>
</html>
